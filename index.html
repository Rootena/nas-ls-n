<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beni Kızdırdın mı? 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(255, 182, 193, 0.4);
            max-width: 600px;
            width: 90%;
            position: relative;
            animation: float 6s ease-in-out infinite;
            border: 3px solid #ffb6c1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #ff6b9d;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.3);
        }

        .gif-container {
            width: 100%;
            height: 300px;
            margin-bottom: 30px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3);
            background: #fff0f5;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ffc0cb;
        }

        .gif-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #evetBtn {
            background: linear-gradient(45deg, #ff6b9d, #ff8fab);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
        }

        #evetBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.6);
        }

        #hayirBtn {
            background: linear-gradient(45deg, #a8e6cf, #88d8b0);
            color: white;
            box-shadow: 0 4px 15px rgba(136, 216, 176, 0.4);
            position: relative;
        }

        #hayirBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(136, 216, 176, 0.6);
        }

        .counter {
            margin-top: 20px;
            font-size: 1.1em;
            color: #ff6b9d;
            font-weight: bold;
        }

        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1000;
        }

        .heart {
            position: absolute;
            font-size: 20px;
            animation: fall linear forwards;
            opacity: 0.8;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .final-message {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 182, 193, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .final-message img {
            max-width: 80%;
            max-height: 60vh;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(255, 255, 255, 0.3);
            border: 3px solid white;
        }

        .final-message h2 {
            color: white;
            font-size: 3em;
            margin-top: 30px;
            text-align: center;
            animation: pulse 2s infinite;
            text-shadow: 2px 2px 4px rgba(255, 107, 157, 0.5);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 2em;
            cursor: pointer;
            background: none;
            border: none;
        }

        .emoji {
            font-size: 2em;
            margin: 0 10px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8em; }
            button { padding: 12px 30px; font-size: 1em; }
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    
    <div class="container">
        <h1>Beni Kızdırdın mı? <span class="emoji">🎀</span></h1>
        
        <div class="gif-container" id="gifContainer">
            <img id="mainGif" src="https://media.tenor.com/BxibqUT9-I0AAAAM/dudu-flower.gif" alt="Cute pink bear">
        </div>
        
        <div class="buttons">
            <button id="evetBtn" onclick="evetTikla()">Evet</button>
            <button id="hayirBtn" onclick="hayirTikla()">Hayır</button>
        </div>
        
        <div class="counter" id="counter"></div>
    </div>

    <div class="final-message" id="finalMessage">
        <button class="close-btn" onclick="kapat()">×</button>
        <img id="finalGif" src="" alt="Final gif">
        <h2>Seni Çok Seviyorum! <span class="emoji">💖</span></h2>
    </div>
